{% extends "base.html" %}
{% block content %}
<section class="discover">
  <div id="tuning" hx-get="/tuning" hx-trigger="load, data-changed from:body"></div>
  <form id="toolbar" class="toolbar" hx-get="/recommendations" hx-target="#results"
        hx-trigger="change">
    <label>Sort <select name="sort">
      <option value="match">Best match</option>
      <option value="quality">Rating</option>
      <option value="year">Newest</option>
      <option value="added">Recently indexed</option>
      <option value="title">Title</option>
    </select></label>
    <label>Type <select name="type">
      <option value="">All</option>
      <option value="manga">Manga</option>
      <option value="manhwa">Manhwa</option>
      <option value="manhua">Manhua</option>
    </select></label>
    <label>Min rating <input name="min_quality" type="number" step="0.5" min="0" max="10"
      value="{{ '%.1f'|format(default_gate) }}" placeholder="gate"></label>
  </form>
  <div id="results" hx-get="/recommendations" hx-include="#toolbar"
       hx-trigger="load, data-changed from:body"></div>
</section>
{% endblock %}
