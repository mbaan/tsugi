    <rect x="12" y="11" width="44" height="44" rx="8" fill="#1c1813"/>
    <rect x="9" y="8" width="44" height="44" rx="8" fill="#d63b22"/>
    <text x="31" y="31" fill="#fbf2e8" text-anchor="middle" dominant-baseline="central"
          font-size="29" font-weight="700"
          font-family="'Zen Kaku Gothic New','Noto Sans CJK JP','Noto Sans JP','Hiragino Sans',sans-serif">次</text>
  </g>
</svg>
